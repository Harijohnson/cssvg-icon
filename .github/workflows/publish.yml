name: Publish

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v*"
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - "icons/**"
      - "index.ts"
      - "package.json"
      - "scripts/**"

# ─── Concurrency guard ───────────────────────────────────────────────────────
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. CI — lint + type-check + build ──────────────────────────────────────
  ci:
    name: CI checks
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ── 2. Publish to npm ──────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: ci
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push version bump commit
      id-token: write  # required for npm provenance
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24 with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate index.ts
        run: node scripts/generate-index.mjs

      - name: Build
        run: npm run build

      # Bump patch version when merging a PR
      # (skip for tag pushes — the tag IS the version)
      - name: Bump patch version
        if: github.event_name == 'pull_request'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json index.ts
          git commit -m "chore: release v${NEW_VERSION} [skip ci]"
          git pull --rebase origin main
          git push

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── 3. Publish to GitHub Packages ─────────────────────────────────────────
  publish-gpr:
    name: Publish to GitHub Packages
    needs: publish-npm   # wait for version bump commit before reading version
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # required to publish to GitHub Packages
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout (latest — includes version bump commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 24 with GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate index.ts
        run: node scripts/generate-index.mjs

      - name: Scope package name for GitHub Packages
        # GitHub Packages requires a scoped name: @owner/package
        # We patch it temporarily — does not affect the npm publish above
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = '@harijohnson/cssvg-icons';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: publish-npm   # version bump commit must exist first
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create releases
    steps:
      - name: Checkout (latest — includes version bump commit)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Build release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Collect icon slugs from icons/ directory
          ICONS=$(ls icons/ | tr '\n' ' ' | sed 's/ $//')
          ICON_COUNT=$(ls icons/ | wc -l | tr -d ' ')

          # Get commits since last tag (or all if no prior tag)
          LAST_TAG=$(git tag --sort=-version:refname | grep -v "v${VERSION}" | head -1)
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges | grep -v '\[skip ci\]' || true)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | grep -v '\[skip ci\]' | head -20 || true)
          fi

          # Write release notes to file
          cat > release_notes.md << EOF
          ## cssvg-icons v${VERSION}

          Animated SVG icon library for React and Next.js.

          **[icon.cssvg.com](https://icon.cssvg.com)** · [npm](https://www.npmjs.com/package/cssvg-icons) · [GitHub Packages](https://github.com/Harijohnson/cssvg-icon/pkgs/npm/cssvg-icons)

          ---

          ### Changes

          ${COMMITS}

          ---

          ### ${ICON_COUNT} Icons Included

          \`\`\`
          ${ICONS}
          \`\`\`

          ---

          ### Installation

          \`\`\`bash
          # npm
          npm install cssvg-icons

          # GitHub Packages
          npm install @harijohnson/cssvg-icons
          \`\`\`

          ### Usage

          \`\`\`tsx
          import { Heart, Settings, ArrowRight } from "cssvg-icons";

          <Heart color="#ffffff" strokeWidth={2} size={40} />
          \`\`\`

          ### Props

          | Prop | Type | Default |
          |---|---|---|
          | \`color\` | \`string\` | \`"currentColor"\` |
          | \`strokeWidth\` | \`number\` | \`2\` |
          | \`size\` | \`number\` | \`40\` |
          | \`className\` | \`string\` | \`""\` |
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
