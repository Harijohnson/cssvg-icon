name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  # ── 1. Categorize PR title ──────────────────────────────────────────────────
  title-check:
    name: PR title prefix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check title prefix (falls back to latest commit message)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          VALID_PREFIXES="feat: fix: chore: docs: refactor: style: test:"
          SUBJECT="$PR_TITLE"

          # If the PR title has no valid prefix, try the latest commit message
          MATCHED=false
          for prefix in $VALID_PREFIXES; do
            if echo "$SUBJECT" | grep -qi "^${prefix}"; then
              MATCHED=true
              break
            fi
          done

          if [ "$MATCHED" = "false" ]; then
            COMMIT_MSG=$(git log -1 --format="%s" origin/main..HEAD 2>/dev/null | head -1)
            if [ -n "$COMMIT_MSG" ]; then
              echo "ℹ️  PR title has no prefix, checking latest commit: \"$COMMIT_MSG\""
              SUBJECT="$COMMIT_MSG"
              for prefix in $VALID_PREFIXES; do
                if echo "$SUBJECT" | grep -qi "^${prefix}"; then
                  MATCHED=true
                  echo "✅ Commit message matches prefix: $prefix"
                  break
                fi
              done
            fi
          else
            echo "✅ PR title matches prefix"
          fi

          if [ "$MATCHED" = "false" ]; then
            echo "❌ Neither the PR title nor the latest commit starts with: feat: | fix: | chore: | docs: | refactor: | style: | test:"
            echo "   PR title : $PR_TITLE"
            echo "   Commit   : $SUBJECT"
            exit 1
          fi

  # ── 2. Icon file validation (only runs when icons/ files are changed) ───────
  icon-check:
    name: Icon file validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed icon folders
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep '^icons/' || true)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          SLUGS=$(echo "$CHANGED" | grep '^icons/' | awk -F'/' '{print $2}' | sort -u)
          echo "slugs<<EOF" >> $GITHUB_OUTPUT
          echo "$SLUGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate icon structure
        if: steps.detect.outputs.slugs != ''
        run: |
          ERRORS=0
          while IFS= read -r slug; do
            [ -z "$slug" ] && continue
            echo "── Checking icon: $slug"

            # Slug format: lowercase + hyphens only
            if ! echo "$slug" | grep -qE '^[a-z][a-z0-9-]+$'; then
              echo "  ❌ Slug '$slug' must be lowercase and hyphen-separated (no uppercase, no underscores)"
              ERRORS=$((ERRORS+1))
            fi

            TSX="icons/$slug/$slug.tsx"
            JSON="icons/$slug/$slug.json"

            # TSX exists
            if [ ! -f "$TSX" ]; then
              echo "  ❌ Missing: $TSX"
              ERRORS=$((ERRORS+1))
            else
              echo "  ✅ $TSX exists"

              # use client directive
              if ! grep -q '"use client"' "$TSX"; then
                echo "  ❌ $TSX missing \"use client\" at top"
                ERRORS=$((ERRORS+1))
              fi

              # viewBox 0 0 40 40
              if ! grep -q 'viewBox="0 0 40 40"' "$TSX"; then
                echo "  ❌ $TSX must have viewBox=\"0 0 40 40\""
                ERRORS=$((ERRORS+1))
              fi

              # SVG width and height must be dynamic (={size}), not hardcoded 40
              # Allow width={size} height={size} — reject width="40" height="40" hardcoded strings
              if grep -qE 'width="[0-9]' "$TSX" || grep -qE 'height="[0-9]' "$TSX"; then
                echo "  ❌ $TSX has hardcoded SVG width/height — use width={size} height={size}"
                ERRORS=$((ERRORS+1))
              fi

              # No hardcoded colours — hex, rgb(), named colours (white/black) on stroke or fill
              if grep -qE 'stroke="#[0-9a-fA-F]' "$TSX"; then
                echo "  ❌ $TSX has hardcoded hex stroke colour — use stroke={color}"
                ERRORS=$((ERRORS+1))
              fi
              if grep -qE 'fill="#[0-9a-fA-F]' "$TSX"; then
                echo "  ❌ $TSX has hardcoded hex fill colour — use fill=\"none\" or fill={color}"
                ERRORS=$((ERRORS+1))
              fi
              if grep -qE 'stroke="(white|black|red|blue|green|gray|grey)"' "$TSX"; then
                echo "  ❌ $TSX has hardcoded named stroke colour — use stroke={color}"
                ERRORS=$((ERRORS+1))
              fi
              if grep -qE 'fill="(white|black|red|blue|green|gray|grey)"' "$TSX"; then
                echo "  ❌ $TSX has hardcoded named fill colour (use fill=\"none\" or fill={color})"
                ERRORS=$((ERRORS+1))
              fi

              # strokeWidth prop (no hardcoded numbers like strokeWidth={2})
              if grep -qE 'strokeWidth=\{[0-9]' "$TSX"; then
                echo "  ❌ $TSX has hardcoded strokeWidth number — use strokeWidth={strokeWidth}"
                ERRORS=$((ERRORS+1))
              fi

              # vectorEffect="non-scaling-stroke" — informational only.
              # Draw-on animated icons (strokeDasharray paths) intentionally omit it.
              NON_SCALING=$(grep -c 'vectorEffect="non-scaling-stroke"' "$TSX" || true)
              if [ "$NON_SCALING" -gt 0 ]; then
                echo "  ✅ $NON_SCALING element(s) use vectorEffect=\"non-scaling-stroke\""
              fi

              # Animation duration must be exactly 4s for all animate/animateTransform elements
              BAD_DUR=$(grep -oE 'dur="[^"]+"' "$TSX" | grep -v 'dur="4s"' || true)
              if [ -n "$BAD_DUR" ]; then
                echo "  ❌ $TSX has animation duration other than 4s:"
                echo "$BAD_DUR" | sed 's/^/     /'
                ERRORS=$((ERRORS+1))
              else
                # Make sure there is at least one animation
                if grep -qE '<animate|<animateTransform' "$TSX"; then
                  echo "  ✅ Animation duration is 4s"
                fi
              fi

              # default export
              if ! grep -q 'export default function' "$TSX"; then
                echo "  ❌ $TSX must have a default export function"
                ERRORS=$((ERRORS+1))
              fi

              echo "  ✅ TSX checks passed"
            fi

            # JSON exists
            if [ ! -f "$JSON" ]; then
              echo "  ❌ Missing: $JSON"
              ERRORS=$((ERRORS+1))
            else
              echo "  ✅ $JSON exists"

              # Required JSON fields (credit is optional, link is required)
              for field in name slug description tags link; do
                if ! grep -q "\"$field\"" "$JSON"; then
                  echo "  ❌ $JSON missing required field: $field"
                  ERRORS=$((ERRORS+1))
                fi
              done

              # tags must be a JSON array (not a plain string)
              TAGS_TYPE=$(node -e "const t=require('./$JSON').tags; console.log(Array.isArray(t)?'array':typeof t)" 2>/dev/null || echo "")
              if [ "$TAGS_TYPE" != "array" ]; then
                echo "  ❌ $JSON 'tags' must be an array, got: $TAGS_TYPE"
                ERRORS=$((ERRORS+1))
              else
                TAGS_LEN=$(node -e "console.log(require('./$JSON').tags.length)" 2>/dev/null || echo "0")
                if [ "$TAGS_LEN" -lt 1 ]; then
                  echo "  ❌ $JSON 'tags' array must have at least one entry"
                  ERRORS=$((ERRORS+1))
                else
                  echo "  ✅ tags is a valid array ($TAGS_LEN entries)"
                fi
              fi

              # Warn if link value is empty
              JSON_LINK=$(node -e "console.log(require('./$JSON').link || '')" 2>/dev/null || echo "")
              if [ -z "$JSON_LINK" ]; then
                echo "  ❌ $JSON 'link' field is empty — must be a valid CSSVG share URL"
                ERRORS=$((ERRORS+1))
              else
                echo "  ✅ link present: $JSON_LINK"
              fi

              # slug in JSON matches folder slug
              JSON_SLUG=$(node -e "console.log(require('./$JSON').slug || '')" 2>/dev/null || echo "")
              if [ "$JSON_SLUG" != "$slug" ]; then
                echo "  ❌ $JSON slug field ('$JSON_SLUG') does not match folder name ('$slug')"
                ERRORS=$((ERRORS+1))
              else
                echo "  ✅ JSON slug matches folder"
              fi
            fi

            echo ""
          done <<< "${{ steps.detect.outputs.slugs }}"

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ $ERRORS error(s) found. See CONTRIBUTING.md for the icon spec."
            exit 1
          else
            echo "✅ All icon checks passed."
          fi

  # ── 3. Type-check + lint (always runs) ─────────────────────────────────────
  ci:
    name: Type-check & lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
